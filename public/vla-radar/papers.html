<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>论文库 · VLA Radar</title>
  <meta name="description" content="VLA Radar 收录的全部论文,按日期归档。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/vla-radar/styles.css?v=20260623-groups" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/vla-radar/">
        <span class="brand-badge">🐾</span>
        <span>Meowsu · VLA Radar</span>
      </a>
      <div class="nav-links">
        <a href="/vla-radar/#timeline">主线</a>
        <a href="/vla-radar/#branches">分化</a>
        <a href="/vla-radar/#finetune">微调</a>
        <a href="/vla-radar/#daily">论文雷达</a>
        <a href="/vla-radar/papers.html">论文库</a>
        <a href="/">返回博客</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="section paper-wrap">
      <div class="container">
        <a class="paper-back" href="/vla-radar/#daily">← 回到论文雷达</a>
        <span class="badge">论文库 · 按日期归档</span>
        <h1 class="paper-title">全部 VLA 论文</h1>
        <p class="paper-meta" id="count"></p>
        <input class="searchbox" id="q" placeholder="搜索:flow / RL / OpenVLA / embodiment / efficient ..." style="margin:16px 0 6px" />
        <div id="root"><div class="paper-state">正在加载论文库 …</div></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Built for Meowsu · 把 VLA 论文流变成 idea radar。</p>
    </div>
  </footer>

  <script>
    const root = document.getElementById('root');
    const countEl = document.getElementById('count');
    const q = document.getElementById('q');
    let all = [];

    const esc = s => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

    // 列表已按 published 倒序;Map 保留插入顺序 → 日期分组天然新→旧
    const groupByDate = papers => {
      const map = new Map();
      for (const p of papers) {
        const d = (p.published || '').slice(0, 10) || '未标注日期';
        if (!map.has(d)) map.set(d, []);
        map.get(d).push(p);
      }
      return [...map.entries()];
    };

    const card = p => `
      <a class="sticker-card paper-card" href="/vla-radar/paper.html?id=${encodeURIComponent(p.arxiv_id)}">
        <span class="year">${esc((p.tags && p.tags[0]) || 'paper')}</span>
        <h3>${esc(p.title || p.arxiv_id)}</h3>
        <p>${esc(p.problem || p.abstract || '')}</p>
        <div class="tag-row">${(p.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
      </a>`;

    const render = papers => {
      if (!papers.length) {
        root.innerHTML = '<div class="paper-state">没有匹配的论文,换个关键词试试。</div>';
        return;
      }
      root.innerHTML = groupByDate(papers).map(([date, list]) => `
        <div class="date-head">📅 ${esc(date)} · ${list.length} 篇</div>
        <div class="archive-grid">${list.map(card).join('')}</div>`).join('');
    };

    const applyFilter = () => {
      const query = q.value.trim().toLowerCase();
      const f = query ? all.filter(p => JSON.stringify(p).toLowerCase().includes(query)) : all;
      countEl.textContent = `共 ${all.length} 篇` + (query ? ` · 匹配 ${f.length} 篇` : '');
      render(f);
    };

    async function load() {
      try {
        const res = await fetch('/api/vla-radar/list?limit=200', { cache: 'no-store' });
        const j = await res.json();
        if (j && j.configured === false) {
          root.innerHTML = '<div class="paper-state">论文库还没接好(Supabase 未配置)。</div>';
          return;
        }
        all = (j && j.papers) || [];
        if (!all.length) {
          countEl.textContent = '';
          root.innerHTML = '<div class="paper-state">还没有论文,等每天早上 9 点的抓取 🛰️</div>';
          return;
        }
        applyFilter();
      } catch (e) {
        root.innerHTML = '<div class="paper-state">加载出错:' + esc(e && e.message ? e.message : e) + '</div>';
      }
    }
    q.addEventListener('input', applyFilter);
    load();
  </script>
</body>
</html>
