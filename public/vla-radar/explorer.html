<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>组件透视 · VLA Radar</title>
  <meta name="description" content="VLA 是一条感知→决策→生成→执行的栈。把每篇论文按它触碰的组件归位，看清这篇到底动了哪一层。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/vla-radar/styles.css?v=20260625-cosmic" />
  <style>
    /* ===== 视角切换条 ===== */
    .ls-views {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 16px 0 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .ls-views::-webkit-scrollbar { display: none; }
    .ls-view {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 2px solid rgba(30, 36, 71, .16);
      border-radius: 999px;
      background: #fff;
      color: var(--meow-ink);
      font-weight: 800;
      font-size: .9rem;
      box-shadow: 2px 2px 0 rgba(30, 36, 71, .12);
      transition: .16s ease;
      white-space: nowrap;
    }
    .ls-view:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 rgba(30, 36, 71, .2); }
    .ls-view.active {
      background: var(--meow-ink);
      color: #fff;
      border-color: var(--meow-ink);
      box-shadow: 3px 3px 0 rgba(30, 36, 71, .35);
    }
    .ls-view-ic { font-size: 1rem; line-height: 1; }

    /* ===== 标题区 ===== */
    .ex-head { padding: 30px 0 8px; }
    .ex-title { margin: 14px 0 10px; font-size: clamp(1.8rem, 4vw, 3rem); line-height: 1.06; }
    .ex-sub { color: var(--meow-muted); font-weight: 600; max-width: 760px; margin: 0; line-height: 1.7; }
    .ex-sub b { color: var(--meow-ink); }

    /* ===== 区块小标题 ===== */
    .ex-block { margin-top: 30px; }
    .ex-block-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .ex-block-head h2 { margin: 0; font-size: clamp(1.3rem, 2.6vw, 1.7rem); line-height: 1.1; }
    .ex-block-head .ex-hint { color: var(--meow-muted); font-weight: 700; font-size: .85rem; }

    /* ===== 组件解剖栈卡 ===== */
    .ex-stack {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }
    .ex-comp {
      text-align: left;
      border: 2px solid var(--meow-ink);
      border-radius: var(--radius-lg);
      background: var(--meow-card);
      box-shadow: 4px 4px 0 rgba(30, 36, 71, .85);
      padding: 16px;
      cursor: pointer;
      transition: .16s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: inherit;
      font-family: inherit;
    }
    .ex-comp:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 rgba(30, 36, 71, .85); }
    .ex-comp.active {
      background: var(--meow-sky);
      box-shadow: 6px 6px 0 rgba(53, 99, 233, .55);
    }
    .ex-comp-top { display: flex; align-items: center; gap: 9px; }
    .ex-comp-ic {
      width: 38px; height: 38px; flex: 0 0 auto;
      display: grid; place-items: center;
      border: 2px solid var(--meow-ink);
      border-radius: 12px;
      background: var(--meow-cream);
      box-shadow: 2px 2px 0 rgba(30, 36, 71, .82);
      font-size: 1.25rem;
    }
    .ex-comp.active .ex-comp-ic { background: #fff; }
    .ex-comp-name { font-family: 'Baloo 2', 'Noto Sans SC', sans-serif; font-weight: 800; font-size: 1.04rem; line-height: 1.15; }
    .ex-comp-stage { display: inline-block; margin-top: 2px; font-size: .68rem; font-weight: 900; letter-spacing: .04em; color: #3153ae; }
    .ex-comp-short { margin: 6px 0 0; color: var(--meow-muted); font-size: .84rem; line-height: 1.5; }
    .ex-comp-count { margin-top: 10px; font-family: 'Baloo 2'; font-weight: 800; font-size: .82rem; color: var(--meow-blue); }
    .ex-comp.active .ex-comp-count { color: var(--meow-blue-deep); }

    /* ===== filter chip 行 ===== */
    .ex-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    .ex-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 2px solid rgba(30, 36, 71, .16);
      border-radius: 999px;
      background: #fff;
      padding: 7px 13px;
      color: var(--meow-ink);
      font-weight: 800;
      font-size: .85rem;
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(30, 36, 71, .12);
      transition: .14s ease;
      font-family: inherit;
    }
    .ex-chip:hover { transform: translate(-1px, -1px); }
    .ex-chip.active {
      border-color: var(--meow-ink);
      background: var(--meow-yellow);
      box-shadow: 3px 3px 0 rgba(30, 36, 71, .85);
    }
    .ex-chip-n {
      font-family: 'Baloo 2';
      font-weight: 800;
      font-size: .76rem;
      color: var(--meow-muted);
    }
    .ex-chip.active .ex-chip-n { color: #7d5a00; }

    /* ===== 论文 grid ===== */
    .ex-papers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .ex-paper {
      display: flex;
      flex-direction: column;
      border: 2px solid var(--meow-ink);
      border-radius: var(--radius-lg);
      background: var(--meow-card);
      box-shadow: 4px 4px 0 rgba(30, 36, 71, .85);
      padding: 16px;
      color: inherit;
      transition: .16s ease;
      min-height: 200px;
    }
    .ex-paper:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-blue); }
    .ex-paper-date { color: var(--meow-muted); font-weight: 800; font-size: .76rem; }
    .ex-paper h3 {
      margin: 6px 0 8px;
      font-size: 1.05rem;
      line-height: 1.22;
    }
    .ex-paper-desc {
      margin: 0;
      color: var(--meow-muted);
      font-size: .88rem;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ex-layers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .ex-layer {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 9px;
      background: var(--meow-sky);
      color: #3153ae;
      font-size: .72rem;
      font-weight: 900;
      border: 1.5px solid rgba(53, 99, 233, .2);
    }
    .ex-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; padding-top: 12px; }
    .ex-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--meow-muted);
      font-weight: 800;
      padding: 40px 0;
    }
    .ex-loading { text-align: center; color: var(--meow-muted); font-weight: 800; padding: 50px 0; }

    @media (max-width: 980px) { .ex-papers { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) {
      .ex-papers { grid-template-columns: 1fr; }
      .ex-stack { grid-template-columns: 1fr; }
      .ex-head { padding-top: 18px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/vla-radar/">
        <span class="brand-badge">🐾</span>
        <span>Meowsu · VLA Radar</span>
      </a>
                  <div class="nav-links">
        <a href="/vla-radar/#map">开放问题</a>
        <a href="/vla-radar/radar.html">雷达</a>
        <a href="/vla-radar/#finetune">微调</a>
        <a href="/vla-radar/views.html">视角</a>
        <a href="/vla-radar/papers.html">论文库</a>
        <a href="/">返回博客</a>
      </div>
    </div>
  </nav>

  <!-- 视角切换条 -->
  <div class="container">
    <div class="ls-views">
      <a class="ls-view" href="/vla-radar/series.html"><span class="ls-view-ic">🧬</span>版本演进</a>
      <a class="ls-view active" href="/vla-radar/explorer.html"><span class="ls-view-ic">🔬</span>组件透视</a>
      <a class="ls-view" href="/vla-radar/flow.html"><span class="ls-view-ic">🔀</span>推理流程</a>
      <a class="ls-view" href="/vla-radar/bench.html"><span class="ls-view-ic">🎯</span>Benchmark</a>
      <a class="ls-view" href="/vla-radar/metro.html"><span class="ls-view-ic">🗺️</span>研究拓扑</a>
    </div>
  </div>

  <main>
    <section class="section ex-head">
      <div class="container">
        <span class="badge">组件透视 · Component Explorer</span>
        <h1 class="ex-title">这篇论文，到底动了哪一层？</h1>
        <p class="ex-sub">VLA 是一条「<b>感知 → 决策 → 生成 → 执行</b>」的栈，多数论文只改其中一两层；下面把每篇按它触碰的组件归位（归属由 tag 自动判定，可命中多层）。</p>

        <div class="ex-block">
          <div class="ex-block-head">
            <h2>VLA 解剖栈</h2>
            <span class="ex-hint">点一张卡，只看触碰该层的论文；再点取消</span>
          </div>
          <div class="ex-stack" id="stack"></div>
        </div>

        <div class="ex-block">
          <div class="ex-block-head">
            <h2>按层筛选</h2>
            <span class="ex-hint" id="paper-summary"></span>
          </div>
          <div class="ex-filters" id="filters"></div>
          <div class="ex-papers" id="papers">
            <div class="ex-loading">正在加载论文 …</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Built for Meowsu · 把 VLA 论文流变成 idea radar。</p>
    </div>
  </footer>

  <script src="/vla-radar/data/curated.js"></script>
  <script>
    const esc = s => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

    const C = (window.VLA_CURATED || {});
    const COMPONENTS = Array.isArray(C.components) ? C.components : [];
    const classify = typeof C.classify === 'function' ? C.classify : () => [];
    const compByKey = {};
    COMPONENTS.forEach(c => { compByKey[c.key] = c; });

    const stackEl = document.getElementById('stack');
    const filtersEl = document.getElementById('filters');
    const papersEl = document.getElementById('papers');
    const summaryEl = document.getElementById('paper-summary');

    let PAPERS = [];          // 每项附加 _comps（命中的组件 key 数组）
    let counts = {};          // key -> 命中论文数
    let active = null;        // 当前选中组件 key（null=全部）

    const firstLine = p => {
      if (p.problem) return p.problem;
      const base = p.diff && p.diff.base;
      if (base) return '在 ' + base + ' 基础上改。';
      if (p.method) return p.method;
      return '点开看这篇改了什么。';
    };

    function renderStack() {
      stackEl.innerHTML = COMPONENTS.map(c => {
        const n = counts[c.key] || 0;
        const on = active === c.key ? ' active' : '';
        return `
          <button class="ex-comp${on}" data-key="${esc(c.key)}" type="button" aria-pressed="${active === c.key}">
            <div class="ex-comp-top">
              <span class="ex-comp-ic">${esc(c.icon)}</span>
              <div>
                <div class="ex-comp-name">${esc(c.name)}</div>
                <span class="ex-comp-stage">${esc(c.stage || '')}</span>
              </div>
            </div>
            <p class="ex-comp-short">${esc(c.short || '')}</p>
            <span class="ex-comp-count">${n} 篇</span>
          </button>`;
      }).join('');
      stackEl.querySelectorAll('.ex-comp').forEach(el => {
        el.addEventListener('click', () => toggle(el.dataset.key));
      });
    }

    function renderFilters() {
      const total = PAPERS.length;
      const allOn = active === null ? ' active' : '';
      let html = `<button class="ex-chip${allOn}" data-key="" type="button">全部 <span class="ex-chip-n">${total}</span></button>`;
      html += COMPONENTS.map(c => {
        const n = counts[c.key] || 0;
        const on = active === c.key ? ' active' : '';
        return `<button class="ex-chip${on}" data-key="${esc(c.key)}" type="button">${esc(c.icon)} ${esc(c.name)} <span class="ex-chip-n">${n}</span></button>`;
      }).join('');
      filtersEl.innerHTML = html;
      filtersEl.querySelectorAll('.ex-chip').forEach(el => {
        el.addEventListener('click', () => {
          const k = el.dataset.key || null;
          if (k === null) { active = null; sync(); }
          else toggle(k);
        });
      });
    }

    function toggle(key) {
      active = (active === key) ? null : key;
      sync();
    }

    function sync() {
      // 更新高亮
      stackEl.querySelectorAll('.ex-comp').forEach(el => {
        const on = el.dataset.key === active;
        el.classList.toggle('active', on);
        el.setAttribute('aria-pressed', on);
      });
      filtersEl.querySelectorAll('.ex-chip').forEach(el => {
        const k = el.dataset.key || null;
        el.classList.toggle('active', k === active);
      });
      renderPapers();
    }

    function renderPapers() {
      const list = active ? PAPERS.filter(p => p._comps.includes(active)) : PAPERS;

      if (active && compByKey[active]) {
        const c = compByKey[active];
        summaryEl.textContent = `已筛选「${c.name}」· ${list.length} 篇`;
      } else {
        summaryEl.textContent = `共 ${PAPERS.length} 篇 · 按发布时间倒序`;
      }

      if (!list.length) {
        papersEl.innerHTML = `<div class="ex-empty">这一层暂时还没有论文命中。换一层看看，或回到「全部」。</div>`;
        return;
      }

      papersEl.innerHTML = list.map(p => {
        const date = (p.published || '').slice(0, 10);
        const layers = p._comps.map(k => {
          const c = compByKey[k];
          if (!c) return '';
          return `<span class="ex-layer">${esc(c.icon)} ${esc(c.name)}</span>`;
        }).join('');
        const tags = (p.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join('');
        const href = `/vla-radar/paper.html?id=${encodeURIComponent(p.arxiv_id)}&from=explorer`;
        return `
          <a class="ex-paper" href="${href}">
            ${date ? `<span class="ex-paper-date">${esc(date)}</span>` : ''}
            <h3>${esc(p.title || p.arxiv_id)}</h3>
            <p class="ex-paper-desc">${esc(firstLine(p))}</p>
            ${layers ? `<div class="ex-layers">${layers}</div>` : ''}
            ${tags ? `<div class="ex-tags">${tags}</div>` : ''}
          </a>`;
      }).join('');
    }

    function ingest(papers) {
      PAPERS = (papers || []).map(p => ({ ...p, _comps: classify(p.tags || []) }));
      PAPERS.sort((a, b) => String(b.published || '').localeCompare(String(a.published || '')));
      counts = {};
      COMPONENTS.forEach(c => { counts[c.key] = 0; });
      PAPERS.forEach(p => p._comps.forEach(k => { if (counts[k] != null) counts[k]++; }));
    }

    async function load() {
      if (!COMPONENTS.length) {
        papersEl.innerHTML = `<div class="ex-empty">组件定义没加载出来（curated.js）。</div>`;
        return;
      }
      try {
        const res = await fetch('/api/vla-radar/list?limit=200', { cache: 'no-store' });
        const j = await res.json();
        if (j && j.configured === false) {
          renderStack(); renderFilters();
          papersEl.innerHTML = `<div class="ex-empty">论文库还没接好，先看上面的解剖栈结构。</div>`;
          return;
        }
        ingest(j.papers || []);
        renderStack();
        renderFilters();
        renderPapers();
        if (!PAPERS.length) {
          papersEl.innerHTML = `<div class="ex-empty">还没有论文入库，过会儿再来。</div>`;
        }
      } catch (e) {
        renderStack();
        renderFilters();
        papersEl.innerHTML = `<div class="ex-empty">加载出错：${esc(e && e.message ? e.message : e)}</div>`;
      }
    }
    load();
  </script>
  <script src="/vla-radar/cursor.js?v=20260627a"></script>
  <script src="/vla-radar/live2d/pet.js?v=20260626g"></script>
</body>
</html>
