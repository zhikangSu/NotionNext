  <script>
    const GROUPS = {

      'benchmark-libero-stress': {

        tags: ['stress test', 'paraphrase', 'robustness'],
        ids: ['2510.03827', '2603.28301', '2510.13626']
      },
      'benchmark-simpler': {
        kind: 'Benchmark Hub', anchor: 'benchmarks', title: 'SimplerEnv',

        tags: ['sim-to-real', 'simulation', 'policy evaluation'],
        ids: ['2405.05941']
      },
      'benchmark-household': {

        intro: '厨房和家庭场景的长程任务仿真 benchmark，适合看 household generalization、合成数据和长期任务组合。',
        tags: ['household', 'long-horizon', 'simulation'],
        ids: ['2406.02523', '2603.04356']
      },
      'benchmark-bimanual': {
        kind: 'Benchmark Hub', anchor: 'benchmarks', title: 'RoboTwin / RoboTwin2.0',
        intro: '双臂、数字孪生、合成数据和多 embodiment 设置，适合观察 bimanual VLA 与 diffusion transformer 路线。',
        tags: ['bimanual', 'synthetic data', 'domain randomization'],
        ids: ['2504.13059', '2506.18088', '2410.07864']
      },
      'benchmark-legacy': {
        kind: 'Benchmark Hub', anchor: 'benchmarks', title: 'CALVIN / Meta-World / ManiSkill',
        intro: 'CALVIN 是老牌长程语言条件操作 benchmark；Meta-World 和 ManiSkill 常作为小模型、空间 VLA 或泛化能力的辅助评估。',
        tags: ['legacy benchmark', 'auxiliary', 'long-horizon'],
        ids: ['2112.03227', '1910.10897', '2107.14483']
      },
      'benchmark-model-line': {
        kind: 'Benchmark Hub', anchor: 'benchmarks', title: '从 ACT 到 π0.7 的模型对比线',
        intro: '这些节点经常被放在同一批 benchmark 表格里比较：谁提升了成功率，谁提升了速度，谁在泛化或鲁棒性上仍然脆弱。',
        tags: ['model line', 'baseline', 'benchmark reading'],
        ids: ['2304.13705', '2303.04137', '2405.12213', '2406.09246', '2410.24164', '2501.09747', '2410.07864', '2502.19645', '2506.01844', '2510.13054', '2604.11757', '2602.18224', '2411.19650', '2508.07917', '2504.16054', '2511.14759', '2604.15483']
      },
      'benchmark-simple-vlas': {
        kind: 'Benchmark Hub', anchor: 'benchmarks', title: 'StarVLA / SimVLA',
        intro: '强简单 baseline 路线：用更少复杂技巧和统一 benchmark 重新检验 VLA 改动到底是不是必要。',
        tags: ['simple baseline', 'efficient-vla', 'benchmark'],
        ids: ['2604.11757', '2602.18224']
      },
      'benchmark-pi-series': {
        kind: 'Benchmark Hub', anchor: 'benchmarks', title: 'π0.5 / π0.6 / π0.7',
        intro: 'π 系列从 flow action expert 走向高层 subtask、经验学习和可 steer context，是当前 VLA 从 BC 到 generalist 控制的重要主线。',
        tags: ['pi-series', 'hierarchy', 'experience learning'],
        ids: ['2504.16054', '2511.14759', '2604.15483']
      },
      'rt-1': {
        kind: 'Mainline', anchor: 'timeline', title: 'RT-1',
        intro: '从大规模真实机器人轨迹和行为克隆开始，Robot Transformer 把多任务机器人控制带入可扩展训练范式。',
        tags: ['robot transformer', 'behavior cloning', 'action token'],
        ids: ['2212.06817']
      },
      'palm-e-rt-2': {

        intro: 'VLM/LLM 的 web-scale 语义先验进入机器人：先把多模态观测接进语言模型，再把动作映射进 token 空间。',

        ids: ['2303.03378', '2307.15818']
      },
      'open-x-rt-x': {
        kind: 'Mainline', anchor: 'timeline', title: 'Open X-Embodiment / RT-X',
        intro: '跨机构、跨机器人、跨任务的数据标准化，让 VLA 从单一平台走向跨 embodiment 训练。',
        tags: ['cross-embodiment', 'dataset', 'rt-x'],
        ids: ['2310.08864']
      },
      'octo-openvla': {
        kind: 'Mainline', anchor: 'timeline', title: 'Octo / OpenVLA',
        intro: '开放 generalist policy 与开源 7B VLA 让社区真正能复现、微调和比较 VLA 路线。',
        tags: ['open source', 'generalist policy', 'fine-tuning'],
        ids: ['2405.12213', '2406.09246']
      },
      'pi0-rdt': {
        kind: 'Mainline', anchor: 'timeline', title: 'π0 / RDT',
        intro: '动作表示从离散 token 扩展到 flow / diffusion action expert，连续动作块开始成为主流方向。',
        tags: ['flow matching', 'diffusion', 'action expert'],
        ids: ['2410.24164', '2410.07864']
      },
      fast: {
        kind: 'Mainline', anchor: 'timeline', title: 'FAST',

        tags: ['action tokenizer', 'frequency', 'hybrid'],
        ids: ['2501.09747']
      },
      'oft-vla0': {
        kind: 'Mainline', anchor: 'timeline', title: 'OpenVLA-OFT / VLA-0',
        intro: '围绕 OpenVLA 的慢推理、离散动作和复杂架构提出两种重要反思：一种是实用改造，一种是几乎不改 VLM 的强 baseline。',
        tags: ['openvla', 'continuous action', 'simple baseline'],
        ids: ['2502.19645', '2510.13054']
      },
      smolvla: {
        kind: 'Mainline', anchor: 'timeline', title: 'SmolVLA',
        intro: '小模型、社区数据、冻结 VLM 和异步推理，把 VLA 拉向更容易复现和部署的路线。',
        tags: ['efficient-vla', 'community data', 'async inference'],
        ids: ['2506.01844']
      },
      pi05: {
        kind: 'Mainline', anchor: 'timeline', title: 'π0.5',
        intro: '把开放世界泛化、高层 subtask 和低层 action 放进同一个 VLA，使长程任务不再完全 flat。',
        tags: ['hierarchy', 'subtask', 'web data'],
        ids: ['2504.16054']
      },
      'pi06-recap': {
        kind: 'Mainline', anchor: 'timeline', title: 'π0.6-star / RECAP',
        intro: '从只模仿演示走向部署后学习：rollout、纠正、reward、advantage 进入 VLA 改进闭环。',
        tags: ['rl', 'experience', 'advantage conditioning'],
        ids: ['2511.14759']
      },
      'star-simvla': {
        kind: 'Mainline', anchor: 'timeline', title: 'StarVLA / SimVLA',
        intro: '强简单 baseline 说明 VLA 社区正在重新审视：复杂架构是否真的必要，还是统一 benchmark 与合理实现已经足够强。',
        tags: ['simple baseline', 'benchmark', 'efficient-vla'],
        ids: ['2604.11757', '2602.18224']
      },
      pi07: {
        kind: 'Mainline', anchor: 'timeline', title: 'π0.7',
        intro: '上下文成为 steer 接口：metadata、subgoal image、history 和 world model 共同影响策略行为。',
        tags: ['steerable', 'context', 'world model'],
        ids: ['2604.15483']
      },
      'benchmark-generalization': {
        kind: '分化方向', anchor: 'branches', title: 'Benchmark 真实性与泛化评测',
        intro: '看标准 benchmark 是否真的测到泛化：是否被背题、换语言是否掉分、换物体/初始状态/环境是否崩掉、结果是否有统计意义。',
        tags: ['benchmark audit', 'generalization', 'robustness'],
        ids: ['2306.03310', '2510.03827', '2603.28301', '2510.13626', '2405.05941']
      },
      'action-representation': {
        kind: '分化方向', anchor: 'branches', title: 'Action Decoder / Representation',
        intro: '看动作如何被表达和解码：action chunking、离散 token、FAST、flow matching、diffusion、continuous action head 与 action expert。',
        tags: ['action token', 'flow', 'diffusion'],
        ids: ['2304.13705', '2303.04137', '2307.15818', '2405.12213', '2406.09246', '2410.24164', '2410.07864', '2501.09747', '2502.19645', '2411.19650']
      },
      'simple-baselines': {
        kind: '分化方向', anchor: 'branches', title: '小模型 / 简单 Baseline / 可复现',
        intro: '看 VLA 社区如何重新审视“大而复杂才强”的假设：更小模型、更简单改造、更低成本部署是否已经足够有竞争力。',
        tags: ['simple baseline', 'efficient-vla', 'reproducible'],
        ids: ['2409.12514', '2502.19645', '2506.01844', '2510.13054', '2604.11757', '2602.18224']
      },
      'reasoning-planning': {
        kind: '分化方向', anchor: 'branches', title: 'High-level Reasoning / Subtask / Goal Image',
        intro: '看 VLA 如何从低层动作扩展到阶段、目标、计划、中间状态和可解释的动作推理。',
        tags: ['subtask', 'goal image', 'action reasoning'],
        ids: ['2504.16054', '2604.15483', '2508.07917', '2605.02881']
      },
      'experience-rl': {
        kind: '分化方向', anchor: 'branches', title: 'RL / Post-training / Experience',
        intro: '看 VLA 如何从 deployment experience、reward feedback、intervention 和失败数据中继续学习，而不只停留在静态 BC。',
        tags: ['rl', 'post-training', 'experience'],
        ids: ['2511.14759']
      },
      'spatial-grounding': {
        kind: '分化方向', anchor: 'branches', title: '3D / Spatial Grounding / Depth',
        intro: '看 VLA 如何补足空间关系、深度、姿态和几何 grounding，这些常常是真实操作失败的关键原因。',
        tags: ['3d', 'depth', 'geometry'],
        ids: ['2501.15830', '2508.09071', '2510.13375', '2508.07917']
      },
      'backbone-expert': {
        kind: '分化方向', anchor: 'branches', title: 'Backbone & Expert',
        intro: '旧入口：看语义 backbone 和动作 expert 如何分工，已并入 Action Decoder / Reasoning 两条新线。',
        tags: ['vlm backbone', 'action expert', 'grounding'],
        ids: ['2303.03378', '2307.15818', '2406.09246', '2410.24164', '2506.01844']
      },
      'hierarchy-planning': {
        kind: '分化方向', anchor: 'branches', title: 'Hierarchy & Planning',
        intro: '旧入口：看长程任务如何被拆成 subtask、goal image、semantic policy 或可 steer context。',
        tags: ['subtask', 'goal image', 'planning'],
        ids: ['2405.12213', '2504.16054', '2604.15483', '2508.07917']
      },
      'data-mixture': {
        kind: '分化方向', anchor: 'branches', title: 'Data Mixture',
        intro: '旧入口：看多机器人数据、web data、社区数据和上下文 metadata 如何被混进同一套训练体系。',
        tags: ['cross-embodiment', 'web data', 'community data'],
        ids: ['2310.08864', '2504.16054', '2506.01844', '2604.15483']
      },
      'efficiency-deploy': {
        kind: '分化方向', anchor: 'branches', title: 'Efficiency & Deploy',
        intro: '旧入口：看 VLA 如何变小、变快、变便宜；已并入小模型 / 简单 baseline 方向。',
        tags: ['efficient-vla', 'latency', 'deploy'],
        ids: ['2409.12514', '2501.09747', '2506.01844', '2406.09246', '2502.19645']
      }
    };

    const FALLBACK = {
      '2303.03378': { arxiv_id:'2303.03378', title:'PaLM-E: An Embodied Multimodal Language Model', published:'2023-03-06', tags:['embodied-llm','grounding'], problem:'把连续机器人观测接入 LLM 的 grounding 问题。' },
      '2410.07864': { arxiv_id:'2410.07864', title:'RDT-1B: a Diffusion Foundation Model for Bimanual Manipulation', published:'2024-10-10', tags:['diffusion','bimanual'], problem:'双臂操作的多峰动作和跨机器人动作空间统一。' },
      '2409.12514': { arxiv_id:'2409.12514', title:'TinyVLA: Towards Fast, Data-Efficient Vision-Language-Action Models for Robotic Manipulation', published:'2024-09-19', tags:['efficient-vla','latency'], problem:'大 VLA 推理慢、数据成本高，难以真实部署。' }
    };

    const params = new URLSearchParams(location.search);
    const id = params.get('id') || 'action-representation';
    const group = GROUPS[id];
    const root = document.getElementById('root');

    const esc = s => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

    const setState = msg => {
      root.innerHTML = `<div class="paper-state">${esc(msg)}</div>`;
    };

    if (!group) {
      setState('没有找到这个论文组。');
    } else {
      document.title = `${group.title} · VLA Radar`;
      document.getElementById('groupBack').href = `/vla-radar/#${group.anchor}`;
      document.getElementById('groupBack').textContent =
        group.anchor === 'benchmarks' ? '← 回到 Benchmark Hub' :
        group.anchor === 'branches' ? '← 回到分化地图' :
        '← 回到主线';
      document.getElementById('groupBadge').textContent = group.kind;
      document.getElementById('groupTitle').textContent = group.title;
      document.getElementById('groupIntro').textContent = group.intro;
      document.getElementById('groupTags').innerHTML = group.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
      load();
    }

    const card = p => `
      <a class="sticker-card paper-card paper-card-link" href="/vla-radar/paper.html?id=${encodeURIComponent(p.arxiv_id)}&from=group&group=${encodeURIComponent(id)}">
        <span class="year">${esc((p.tags && p.tags[0]) || 'paper')}</span>
        <h3>${esc(p.title || p.arxiv_id)}</h3>
        <p>${esc(p.problem || p.abstract || '')}</p>
        <div class="tag-row">${(p.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
      </a>`;

    async function load() {
      try {
        const res = await fetch('/api/vla-radar/list?limit=200', { cache: 'no-store' });
        const j = await res.json();
        const map = new Map(((j && j.papers) || []).map(p => [p.arxiv_id, p]));
        const papers = group.ids.map(pid => map.get(pid) || FALLBACK[pid]).filter(Boolean);
        const missing = group.ids.filter(pid => !map.has(pid));
        if (!papers.length) {
          setState('这个方向还没有入库论文。');
          return;
        }
        root.innerHTML = `
          <div class="group-summary">
            <strong>${papers.length}</strong>
            <span>篇相关论文</span>
            ${missing.length ? `<em>${missing.length} 篇刚补充，部署缓存刷新后会显示完整详情。</em>` : ''}
          </div>
          <div class="archive-grid">${papers.map(card).join('')}</div>`;
      } catch (e) {
        setState('加载出错：' + (e && e.message ? e.message : e));
      }
    }
  </script>
</body>
</html>
