<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>论文详情 · VLA Radar</title>
  <meta name="description" content="VLA 论文的结构化拆解：问题 / 方法 / 相对变化 / 证据 / idea。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/vla-radar/styles.css?v=20260625-cosmic" />
  <style>
    .status-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:14px 0 4px; }
    .st-tier { font-weight:800; font-size:.84rem; padding:4px 12px; border-radius:999px; border:2px solid var(--meow-ink); }
    .st-tier.st-map { background:var(--meow-blue); color:#fff; }
    .st-tier.st-radar { background:var(--meow-yellow); color:var(--meow-ink); }
    .st-tier.st-arch { background:#fff; color:var(--meow-muted); }
    .st-q { font-weight:800; font-size:.82rem; color:var(--meow-blue); letter-spacing:1px; }
    .st-pain { font-weight:700; font-size:.78rem; padding:3px 10px; border-radius:8px; background:var(--meow-sky); color:var(--meow-blue); }
    .st-code { font-weight:700; font-size:.78rem; padding:3px 10px; border-radius:8px; background:var(--meow-cream); color:var(--meow-ink); }
    .st-reason { margin:8px 0 0; color:var(--meow-muted); font-size:.86rem; font-weight:600; line-height:1.6; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/vla-radar/">
        <span class="brand-badge">🐾</span>
        <span>Meowsu · VLA Radar</span>
      </a>
                  <div class="nav-links">
        <a href="/vla-radar/#map">开放问题</a>
        <a href="/vla-radar/radar.html">雷达</a>
        <a href="/vla-radar/#finetune">微调</a>
        <a href="/vla-radar/views.html">视角</a>
        <a href="/vla-radar/papers.html">论文库</a>
        <a href="/">返回博客</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="section paper-wrap">
      <div class="container">
        <a class="paper-back" id="paperBack" href="/vla-radar/">← 回到地图</a>
        <div id="paperRoot">
          <div class="paper-state" id="paperState">正在加载论文分析 …</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Built for Meowsu · 把 VLA 论文流变成 idea radar。</p>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(location.search);
    const id = (params.get('id') || '').trim();
    const from = (params.get('from') || '').trim();
    const root = document.getElementById('paperRoot');
    const back = document.getElementById('paperBack');
    if (back && from === 'works') {
      back.href = '/vla-radar/';
      back.textContent = '← 回到地图';
    } else if (back && from === 'papers') {
      back.href = '/vla-radar/papers.html';
      back.textContent = '← 回到论文库';
    } else if (back && from === 'group') {
      const group = (params.get('group') || '').trim();
      back.href = group ? `/vla-radar/group.html?id=${encodeURIComponent(group)}` : '/vla-radar/';
      back.textContent = '← 回到论文组';
    } else if (back && from === 'series') {
      back.href = '/vla-radar/series.html';
      back.textContent = '← 回到版本演进';
    } else if (back && from === 'explorer') {
      back.href = '/vla-radar/explorer.html';
      back.textContent = '← 回到组件透视';
    } else if (back && from === 'flow') {
      back.href = '/vla-radar/flow.html';
      back.textContent = '← 回到推理流程';
    } else if (back && from === 'bench') {
      back.href = '/vla-radar/bench.html';
      back.textContent = '← 回到 Benchmark 可信度';
    } else if (back && from === 'metro') {
      back.href = '/vla-radar/metro.html';
      back.textContent = '← 回到研究拓扑';
    } else if (back && from === 'radar') {
      back.href = '/vla-radar/radar.html';
      back.textContent = '← 回到雷达';
    } else if (back && from === 'home') {
      back.href = '/vla-radar/#map';
      back.textContent = '← 回到地图';
    }

    const esc = s => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

    const setState = msg => {
      root.innerHTML = `<div class="paper-state">${esc(msg)}</div>`;
    };

    const linkButtons = p => {
      const defs = [
        {url: p.arxiv_url || (p.arxiv_id ? `https://arxiv.org/abs/${p.arxiv_id}` : ''), cls:'arxiv', icon:'📄', label:'arXiv 原文'},
        {url: p.github_url, cls:'code', icon:'💻', label:'代码仓库'},
        {url: p.project_url, cls:'project', icon:'🔗', label:'项目页'}
      ];
      const btns = defs.filter(d => d.url)
        .map(d => `<a class="link-btn ${d.cls}" href="${esc(d.url)}" target="_blank" rel="noopener noreferrer">${d.icon} ${d.label}</a>`)
        .join('');
      return btns ? `<div class="link-row">${btns}</div>` : '';
    };

    const analysisBlock = (icon, label, value) => {
      if (!value) return '';
      return `
        <div class="analysis-item">
          <h4><span class="pin">${icon}</span>${esc(label)}</h4>
          <p>${esc(value)}</p>
        </div>`;
    };

    // diff 卡:它在谁的基础上改、改了什么、跟谁比、benchmark 前→后、信不信
    const diffBlock = p => {
      const d = (p.diff && typeof p.diff === 'object') ? p.diff : {};
      const changes = Array.isArray(d.changes) ? d.changes.filter(Boolean) : [];
      const baselines = Array.isArray(d.baselines) ? d.baselines.filter(Boolean) : [];
      const benches = Array.isArray(d.benchmarks) ? d.benchmarks.filter(b => b && b.name) : [];
      if (!d.base && !changes.length && !baselines.length && !benches.length && !d.risk) return '';
      const benchRows = benches.map(b => `<tr><td>${esc(b.name)}</td><td>${esc(b.metric||'')}</td><td>${esc(b.before||'')}</td><td><b>${esc(b.after||'')}</b></td></tr>`).join('');
      return `
        <div class="sticker-card card-pad diff-card" style="margin-top:16px">
          <span class="badge">改了什么 · diff</span>
          ${d.base ? `<p class="diff-base">在 <b>${esc(d.base)}</b> 基础上改</p>` : ''}
          ${changes.length ? `<ul class="diff-changes">${changes.map(c => `<li>${esc(c)}</li>`).join('')}</ul>` : ''}
          ${baselines.length ? `<p class="diff-line"><span class="dk">跟谁比</span>${baselines.map(esc).join(' / ')}</p>` : ''}
          ${benchRows ? `<div class="fig-table-wrap"><table class="fig-table"><thead><tr><th>benchmark</th><th>指标</th><th>before</th><th>after</th></tr></thead><tbody>${benchRows}</tbody></table></div>` : ''}
          ${d.risk ? `<p class="diff-line warn"><span class="dk">信不信</span>${esc(d.risk)}</p>` : ''}
        </div>`;
    };

    // 「全文重新解析」控件：已排队就显示状态，否则给一个按钮
    const deepControl = p => {
      if (p.deep_requested) {
        return `<div class="deep-queued">⏳ 已在全文重析队列中，drain 任务跑完会自动更新本页</div>`;
      }
      return `
        <div class="link-row"><button class="link-btn deep" id="deepBtn">🔬 全文重新解析</button></div>
        <div class="deep-note" id="deepNote" hidden></div>`;
    };

    async function requestDeep(id, btn) {
      const note = document.getElementById('deepNote');
      btn.disabled = true;
      btn.textContent = '提交中…';
      try {
        const res = await fetch(`/api/vla-radar/request?id=${encodeURIComponent(id)}`, { method: 'POST' });
        const j = await res.json().catch(() => ({}));
        if (res.ok && j.queued) {
          btn.textContent = j.triggered ? '✅ 已触发 Codex' : '✅ 已排队';
          if (note) {
            note.hidden = false;
            note.textContent = j.triggered
              ? '已立即唤醒 Codex 做全文重析，通常 1~3 分钟内本页会自动刷新出新结果…'
              : '已加入队列，等下一次 drain 任务跑完会自动更新本页。';
          }
          pollUntilUpdated(id);
        } else {
          btn.disabled = false; btn.textContent = '🔬 全文重新解析';
          if (note) { note.hidden = false; note.textContent = '排队失败：' + (j.message || res.status); }
        }
      } catch (e) {
        btn.disabled = false; btn.textContent = '🔬 全文重新解析';
        if (note) { note.hidden = false; note.textContent = '排队出错：' + (e && e.message ? e.message : e); }
      }
    }

    // 点完后轮询：检测到队列标记被清除（说明已重析完入库）就自动刷新本页
    function pollUntilUpdated(id, tries = 18) {
      let n = 0;
      const iv = setInterval(async () => {
        if (++n > tries) { clearInterval(iv); return; }
        try {
          const r = await fetch(`/api/vla-radar/paper?id=${encodeURIComponent(id)}&_=${Date.now()}`, { cache: 'no-store' });
          const j = await r.json();
          if (j && j.paper && j.paper.deep_requested === false) { clearInterval(iv); location.reload(); }
        } catch (e) {}
      }, 20000);
    }

    const imageFigure = f => {
      if (!f || !f.url) return '';
      return `
        <figure class="fig">
          <a class="fig-media" href="${esc(f.url)}" target="_blank" rel="noopener noreferrer">
            <img src="${esc(f.url)}" alt="${esc(f.caption || 'figure')}" loading="lazy" referrerpolicy="no-referrer" onerror="this.closest('.fig').style.display='none'" />
          </a>
          ${f.caption ? `<figcaption>${esc(f.caption)}</figcaption>` : ''}
        </figure>`;
    };

    const tableFigure = f => {
      const cols = Array.isArray(f.columns) ? f.columns : [];
      const rows = Array.isArray(f.rows) ? f.rows : [];
      if (!cols.length || !rows.length) return '';
      return `
        <figure class="fig table-fig">
          ${f.title ? `<h4>${esc(f.title)}</h4>` : ''}
          <div class="fig-table-wrap">
            <table class="fig-table">
              <thead><tr>${cols.map(c => `<th>${esc(c)}</th>`).join('')}</tr></thead>
              <tbody>
                ${rows.map(row => `<tr>${cols.map((_, i) => `<td>${esc(Array.isArray(row) ? row[i] : '')}</td>`).join('')}</tr>`).join('')}
              </tbody>
            </table>
          </div>
          ${f.caption ? `<figcaption>${esc(f.caption)}</figcaption>` : ''}
        </figure>`;
    };

    // 关键图表：arXiv HTML 直链图 + 结构化关键表；图加载失败就隐藏，不影响其它内容
    const figuresBlock = p => {
      const items = Array.isArray(p.figures) ? p.figures : [];
      const images = items.filter(f => f && f.url);
      const tables = items.filter(f => f && (f.type === 'table' || Array.isArray(f.columns)));
      if (!images.length && !tables.length) return '';
      return `
        <div class="sticker-card card-pad" style="margin-top:16px">
          <span class="badge">关键图表</span>
          ${images.length ? `<div class="figures">${images.map(imageFigure).join('')}</div>` : ''}
          ${tables.length ? `<div class="figure-tables">${tables.map(tableFigure).join('')}</div>` : ''}
        </div>`;
    };

    // 漏斗状态行：层级 / 质量 / 命中痛点 / 代码状态 / 一句话分诊理由
    const PAIN_NAMES = { data:'数据瓶颈', generalization:'泛化', action:'动作表示', reasoning:'长程推理', posttrain:'部署后变强', efficiency:'效率/可复现', eval:'评测可信度', safety:'鲁棒/安全' };
    const CODE_NAMES = { released:'已开源', promised:'已挂链接', none:'无代码迹象', 'closed-source':'闭源' };
    const statusRow = p => {
      const t = p.tier;
      const label = t === 2 ? '🗺️ 地图地标' : t === 1 ? '📡 雷达' : '🗄️ 仅档案';
      const cls = t === 2 ? 'st-map' : t === 1 ? 'st-radar' : 'st-arch';
      const q = Math.max(0, Math.min(3, Number(p.quality || 0)));
      const qStr = q ? '质量 ' + '●'.repeat(q) + '○'.repeat(3 - q) : '';
      const pains = (Array.isArray(p.pain_points) ? p.pain_points : []).map(k => `<span class="st-pain">${esc(PAIN_NAMES[k] || k)}</span>`).join('');
      const code = (p.code_status && p.code_status !== 'unknown') ? `<span class="st-code">代码:${esc(CODE_NAMES[p.code_status] || p.code_status)}</span>` : '';
      const row = `<div class="status-row"><span class="st-tier ${cls}">${label}</span>${qStr ? `<span class="st-q">${qStr}</span>` : ''}${pains}${code}</div>`;
      return row + (p.triage_reason ? `<p class="st-reason">📌 ${esc(p.triage_reason)}</p>` : '');
    };

    const render = p => {
      document.title = `${p.title || '论文'} · VLA Radar`;
      const tags = (Array.isArray(p.tags) ? p.tags : []).map(t => `<span class="tag pink">${esc(t)}</span>`).join('');
      const meta = [p.authors, (p.published || '').slice(0, 10)].filter(Boolean).map(esc).join(' · ');
      const analysis = [
        analysisBlock('🎯', '它在打什么问题', p.problem),
        analysisBlock('🔧', '它改了哪一层', p.method),
        analysisBlock('📐', '相对 SOTA 变了什么', p.delta),
        analysisBlock('🔬', '结果可信吗', p.evidence),
        analysisBlock('💡', '对我有什么启发', p.idea_signal)
      ].join('');
      const abstract = p.abstract
        ? `<div class="sticker-card card-pad" style="margin-top:16px">
             <span class="badge">原始摘要</span>
             <p style="margin:12px 0 0;color:var(--meow-muted);line-height:1.8">${esc(p.abstract)}</p>
           </div>`
        : '';

      root.innerHTML = `
        <span class="badge">论文雷达 · 结构化拆解</span>
        <h1 class="paper-title">${esc(p.title || p.arxiv_id || '未命名论文')}</h1>
        ${meta ? `<p class="paper-meta">${meta}</p>` : ''}
        ${p.arxiv_id ? `<p class="paper-meta">arXiv: ${esc(p.arxiv_id)}</p>` : ''}
        ${statusRow(p)}
        ${tags ? `<div class="tag-row" style="margin-top:10px">${tags}</div>` : ''}
        ${linkButtons(p)}
        ${deepControl(p)}
        ${diffBlock(p)}
        <div class="sticker-card card-pad" style="margin-top:22px">
          <div class="analysis">
            ${analysis || '<div class="paper-state" style="padding:24px 0">这篇还没生成结构化分析，明早 9 点的抓取会补上。</div>'}
          </div>
        </div>
        ${figuresBlock(p)}
        ${abstract}`;

      const deepBtn = document.getElementById('deepBtn');
      if (deepBtn) deepBtn.addEventListener('click', () => requestDeep(p.arxiv_id, deepBtn));
    };

    async function load() {
      if (!id) { setState('缺少论文 id。'); return; }
      try {
        const res = await fetch(`/api/vla-radar/paper?id=${encodeURIComponent(id)}`, { cache: 'no-store' });
        if (res.status === 404) { setState('没找到这篇论文，可能还没入库。'); return; }
        const payload = await res.json();
        if (payload && payload.configured === false) {
          setState('论文库还没接好（Supabase 未配置）。');
          return;
        }
        if (!payload || !payload.ok || !payload.paper) { setState('加载失败，请稍后再试。'); return; }
        render(payload.paper);
      } catch (e) {
        setState('加载出错：' + (e && e.message ? e.message : e));
      }
    }
    load();
  </script>
  <script src="/vla-radar/cursor.js?v=20260627a"></script>
  <script src="/vla-radar/live2d/pet.js?v=20260626g"></script>
</body>
</html>
